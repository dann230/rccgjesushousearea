      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .section-divider { background: linear-gradient(90deg, transparent, #c9a84c, transparent); height: 1px; }

    .scroll-hidden { overflow: hidden; }

    .month-card {

    }
    .month-card:hover {
      transform: translateY(-6px);
    }
    .month-card:hover .month-overlay {
      opacity: 1;
    }
    .month-card .month-overlay {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-overlay {
      transition: opacity 0.3s ease;
    }
    .modal-content {
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-overlay.active .modal-content {
      transform: translateY(0);
      opacity: 1;
    }

    .sermon-item:hover {
      background: rgba(15, 43, 91, 0.03);
    }

    .year-btn.active {
      background: linear-gradient(135deg, #c9a84c, #dfc06e);
      color: #091d3e;
      box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
    }

    .play-btn {
      transition: all 0.3s ease;
    }
    .play-btn:hover {
      transform: scale(1.1);
    }
    .play-btn.playing {
      background: #1b7a3d;
      box-shadow: 0 0 0 4px rgba(27, 122, 61, 0.2);
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(201, 168, 76, 0); }
      100% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0); }
    }
    .pulse-ring { animation: pulse-ring 2s infinite; }

    .audio-bar {
      display: inline-block;
      width: 3px;
      margin: 0 1px;
      background: #1b7a3d;
      border-radius: 2px;
      animation: audio-wave 1.2s ease-in-out infinite;
    }
    .audio-bar:nth-child(1) { animation-delay: 0s; height: 8px; }
    .audio-bar:nth-child(2) { animation-delay: 0.1s; height: 14px; }
    .audio-bar:nth-child(3) { animation-delay: 0.2s; height: 6px; }
    .audio-bar:nth-child(4) { animation-delay: 0.3s; height: 16px; }
    .audio-bar:nth-child(5) { animation-delay: 0.4s; height: 10px; }

    @keyframes audio-wave {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1); }
    }

    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.2);
    }

    /* Audio Player */
    .audio-player {
      transition: all 0.3s ease;
    }
    .audio-player.active {
      border-color: #1b7a3d;
      background: rgba(27, 122, 61, 0.03);
    }

    .progress-bar {
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, #1b7a3d 0%, #1b7a3d var(--progress, 0%), #e5e7eb var(--progress, 0%), #e5e7eb 100%);
      cursor: pointer;
    }
    .progress-bar::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 2px;
      background: transparent;
    }
    .progress-bar::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1b7a3d;
      cursor: pointer;
      box-shadow: 0 0 0 3px white, 0 0 0 5px rgba(27,122,61,0.2);
      margin-top: -5px;
    }
    .progress-bar::-moz-range-track {
      height: 4px;
      border-radius: 2px;
      background: transparent;
    }
    .progress-bar::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1b7a3d;
      cursor: pointer;
      box-shadow: 0 0 0 3px white, 0 0 0 5px rgba(27,122,61,0.2);

    // ============================
    // APP STATE
    // ============================
    let currentYear = 2026;
    let currentPlayingSermon = null;
    let isPlaying = false;
    let playInterval = null;
    // Audio element for real sermon files
    const sermonAudio = new Audio();
    sermonAudio.preload = 'metadata';
    sermonAudio.addEventListener('loadedmetadata', () => {
      if (currentPlayingSermon && currentPlayingSermon.sermon && currentPlayingSermon.sermon.audio) {
        updateTimeDisplay();
      }
    });
    sermonAudio.addEventListener('timeupdate', () => {
      if (!currentPlayingSermon) return;
      const progressSlider = document.getElementById('progressSlider');
      if (currentPlayingSermon.sermon && currentPlayingSermon.sermon.audio && sermonAudio.duration) {
        const pct = (sermonAudio.currentTime / sermonAudio.duration) * 100;
        progressSlider.value = isNaN(pct) ? 0 : pct;
        updateProgressFill(progressSlider);
        updateTimeDisplay();
      }
    });
    sermonAudio.addEventListener('ended', () => {
      isPlaying = false;
      updatePlayerUI();
    });

    const progressSlider = document.getElementById('progressSlider');
    const updateProgressFill = (slider) => {
      if (!slider) return;
      const value = parseInt(slider.value, 10) || 0;
      slider.style.setProperty('--progress', `${value}%`);
    };

    if (progressSlider) {
      const seekAudio = () => {
        if (!currentPlayingSermon) return;
        const sermon = currentPlayingSermon.sermon;
        const value = parseInt(progressSlider.value, 10);

        if (sermon && sermon.audio && sermonAudio.duration) {
          sermonAudio.currentTime = (value / 100) * sermonAudio.duration;
        }

        updateProgressFill(progressSlider);
        updateTimeDisplay();
      };

      progressSlider.addEventListener('input', seekAudio);
      progressSlider.addEventListener('change', seekAudio);
      updateProgressFill(progressSlider);
    }

    const monthNames = ['january','february','march','april','may','june','july','august','september','october','november','december'];
    const monthLabels = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const monthColors = [
      'from-blue-900 to-blue-700',    // Jan - New Beginnings
      'from-red-800 to-pink-600',     // Feb - Love
      'from-green-800 to-emerald-600',// Mar - Breakthrough
      'from-emerald-700 to-green-500',// Apr - Rooted
      'from-yellow-700 to-amber-500', // May - Praise
      'from-orange-700 to-red-500',   // Jun - Fire/Power
      'from-blue-800 to-indigo-600',  // Jul - Providence
      'from-purple-800 to-violet-600',// Aug - Family
      'from-sky-800 to-cyan-600',     // Sep - King's Mandate
      'from-amber-700 to-yellow-500', // Oct - Harvest

      'from-red-900 to-red-600'       // Dec - Emmanuel
    ];

    // ============================
    // RENDER MONTHS GRID
    // ============================
    function renderMonths() {
      const grid = document.getElementById('monthsGrid');
      const yearData = sermonData[currentYear];
      
      if (!yearData) {
        grid.innerHTML = `<div class="col-span-full text-center py-12"><i data-lucide="calendar-x" class="w-16 h-16 text-gray-300 mx-auto mb-4"></i><p class="text-gray-400 text-lg">No sermons available for ${currentYear}</p></div>`;
        lucide.createIcons();
        return;
      }

      grid.innerHTML = '';
      
      monthNames.forEach((month, index) => {
        if (!yearData[month]) return;
        
        const data = yearData[month];
        const sermonCount = data.sermons.length;
        
        const card = document.createElement('div');
        card.className = 'month-card relative rounded-2xl overflow-hidden cursor-pointer shadow-lg hover:shadow-2xl group';
        card.innerHTML = `
          <div class="aspect-[4/3] relative">
            <img src="${data.image}" alt="${monthLabels[index]}" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t ${monthColors[index]} opacity-70 group-hover:opacity-80 transition-opacity"></div>
            <div class="month-overlay absolute inset-0 bg-black/30 flex items-center justify-center">
              <div class="w-14 h-14 gold-gradient rounded-full flex items-center justify-center shadow-xl">
                <i data-lucide="play" class="w-6 h-6 text-church-blue-dark ml-0.5"></i>
              </div>
            </div>
            <div class="absolute inset-0 flex flex-col justify-end p-4 sm:p-5">
              <span class="text-white/60 text-xs font-semibold uppercase tracking-wider">${currentYear}</span>
              <h3 class="text-base sm:text-lg font-display font-bold text-white leading-tight">${monthLabels[index]}</h3>
              <p class="text-white/70 text-xs mt-1 line-clamp-2" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${data.theme}</p>
              <div class="flex items-center gap-2 mt-2">
                <span class="inline-flex items-center gap-1 bg-white/20 backdrop-blur-sm rounded-full px-2 py-0.5 text-[10px] text-white font-medium">
                  <i data-lucide="headphones" class="w-3 h-3"></i>
                  ${sermonCount} sermon${sermonCount !== 1 ? 's' : ''}
                </span>
              </div>
            </div>
          </div>
        `;
        
        card.addEventListener('click', () => openMonthModal(month, index));
        grid.appendChild(card);
      });
      
      lucide.createIcons();
    }

    // ============================
    // MODAL
    // ============================
    const modal = document.getElementById('sermonModal');
    const closeBtn = document.getElementById('closeModal');
    
    function openMonthModal(month, monthIndex) {
      const yearData = sermonData[currentYear];
      const data = yearData[month];
      
      document.getElementById('modalMonthTitle').textContent = `${monthLabels[monthIndex]} ${currentYear}`;
      document.getElementById('modalTheme').textContent = `Theme: ${data.theme}`;
      document.getElementById('modalImage').src = data.image;
      
      const list = document.getElementById('sermonList');
      list.innerHTML = '';
      
      data.sermons.forEach((sermon, idx) => {
        const isCurrentlyPlaying = currentPlayingSermon && currentPlayingSermon.month === month && currentPlayingSermon.year === currentYear && currentPlayingSermon.index === idx;
        
        const item = document.createElement('div');
        item.className = `sermon-item flex items-center gap-3 sm:gap-4 p-3 sm:p-4 rounded-xl border border-gray-100 transition-all cursor-pointer ${isCurrentlyPlaying ? 'bg-church-green/5 border-church-green/30' : 'hover:border-church-blue/20'}`;
        item.innerHTML = `
          <button class="play-btn w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center shrink-0 transition-all ${isCurrentlyPlaying && isPlaying ? 'playing bg-church-green text-white' : 'bg-church-blue text-white hover:bg-church-blue-light'}">
            <i data-lucide="${isCurrentlyPlaying && isPlaying ? 'pause' : 'play'}" class="w-4 h-4 sm:w-5 sm:h-5 ${isCurrentlyPlaying && isPlaying ? '' : 'ml-0.5'}"></i>
          </button>
          <div class="flex-1 min-w-0">
            <h4 class="text-sm sm:text-base font-semibold text-church-blue truncate">${sermon.title}</h4>
            <p class="text-xs text-gray-400 mt-0.5">${sermon.preacher} · ${sermon.date}</p>
            ${sermon.note ? `<p class="text-[11px] text-amber-600 font-semibold mt-1 flex items-center gap-1"><i data-lucide="users" class="w-3.5 h-3.5"></i>${sermon.note}</p>` : ''}
          </div>
          <div class="text-right shrink-0 hidden sm:block">
            <span class="text-xs text-gray-400">${sermon.duration}</span>
            ${isCurrentlyPlaying ? '<div class="flex items-center justify-end mt-1"><span class="audio-bar"></span><span class="audio-bar"></span><span class="audio-bar"></span><span class="audio-bar"></span><span class="audio-bar"></span></div>' : ''}
          </div>
        `;
        
        item.querySelector('.play-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          playSermon(sermon, month, idx);
        });
        item.addEventListener('click', () => playSermon(sermon, month, idx));
        
        list.appendChild(item);
      });
      
      modal.classList.add('active');
      document.body.classList.add('scroll-hidden');
      lucide.createIcons();
    }
    
    function closeModal() {
      modal.classList.remove('active');
      document.body.classList.remove('scroll-hidden');
    }
    
    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // ============================
    // AUDIO PLAYER SIMULATION
    // ============================
    function playSermon(sermon, month, idx) {
      const playerContainer = document.getElementById('audioPlayerContainer');
      const playerTitle = document.getElementById('playerTitle');
      const playerPreacher = document.getElementById('playerPreacher');
      const playerIcon = document.getElementById('playerIcon');
      const waveContainer = document.getElementById('audioWaveContainer');
      const progressSlider = document.getElementById('progressSlider');
      
      playerContainer.classList.remove('hidden');
      
      // If clicking the same sermon, toggle play/pause
      if (currentPlayingSermon && currentPlayingSermon.month === month && currentPlayingSermon.year === currentYear && currentPlayingSermon.index === idx) {
        // Toggle play/pause for same sermon
        if (currentPlayingSermon.sermon && currentPlayingSermon.sermon.audio) {
          if (sermonAudio.paused) {
            sermonAudio.play();
            isPlaying = true;
          } else {
            sermonAudio.pause();
            isPlaying = false;
          }
        } else {
          isPlaying = !isPlaying;
        }
        updatePlayerUI();
        return;
      }

      // start a new sermon
      currentPlayingSermon = { month, year: currentYear, index: idx, sermon };
      isPlaying = true;

      playerTitle.textContent = sermon.title;
      playerPreacher.textContent = sermon.preacher + ' · ' + sermon.date;
      progressSlider.value = 0;

      // If sermon has a real audio file, load and play it
      if (sermon.audio) {
        try {
          sermonAudio.src = sermon.audio;
          sermonAudio.currentTime = 0;
          sermonAudio.play();
        } catch (err) {
          console.warn('Error loading sermon audio', err);
        }
      }

      updatePlayerUI();

      // Scroll to player
      playerContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      // Re-render modal content to update playing states
      const monthIndex = monthNames.indexOf(month);
      openMonthModal(month, monthIndex);
    }
    
    function updatePlayerUI() {
      const playerIcon = document.getElementById('playerIcon');
      const toggleBtn = document.getElementById('playerToggle');
      const waveContainer = document.getElementById('audioWaveContainer');

      if (isPlaying) {
        playerIcon.setAttribute('data-lucide', 'pause');
        toggleBtn.classList.add('playing');
        waveContainer.classList.remove('hidden');
      } else {
        playerIcon.setAttribute('data-lucide', 'play');
        toggleBtn.classList.remove('playing');
        waveContainer.classList.add('hidden');
      }
      lucide.createIcons();

      // If current sermon has real audio, rely on the audio element for timing
      if (currentPlayingSermon && currentPlayingSermon.sermon && currentPlayingSermon.sermon.audio) {
        if (isPlaying) {
          sermonAudio.play().catch(() => {});
        } else {
          sermonAudio.pause();
        }
        // make sure any simulated interval is cleared
        if (playInterval) { clearInterval(playInterval); playInterval = null; }
      } else {
        // Simulate progress for non-audio sermons
        if (isPlaying) {
          if (!playInterval) {
            const progressSlider = document.getElementById('progressSlider');
            playInterval = setInterval(() => {
              let val = parseInt(progressSlider.value);
              if (val >= 100) {
                clearInterval(playInterval);
                playInterval = null;
                isPlaying = false;
                updatePlayerUI();
                return;
              }
              progressSlider.value = val + 1;
              updateProgressFill(progressSlider);
              updateTimeDisplay();
            }, 1000);
          }
        } else {
          if (playInterval) { clearInterval(playInterval); playInterval = null; }
        }
      }
    }
    
    document.getElementById('playerToggle').addEventListener('click', () => {
      if (!currentPlayingSermon) return;
      const sermon = currentPlayingSermon.sermon;
      if (sermon && sermon.audio) {
        if (sermonAudio.paused) { sermonAudio.play(); isPlaying = true; }
        else { sermonAudio.pause(); isPlaying = false; }
      } else {
        isPlaying = !isPlaying;
      }
      updatePlayerUI();
    });
    
    function updateTimeDisplay() {
      if (!currentPlayingSermon) return;
      const progressSlider = document.getElementById('progressSlider');
      const currentTimeEl = document.getElementById('currentTime');
      const totalTimeEl = document.getElementById('totalTime');

      const sermon = currentPlayingSermon.sermon;
      if (sermon && sermon.audio && sermonAudio.duration) {
        const currentSec = Math.floor(sermonAudio.currentTime);
        const totalSec = Math.floor(sermonAudio.duration);
        currentTimeEl.textContent = formatTime(currentSec);
        totalTimeEl.textContent = formatTime(totalSec);
      } else {
        const totalSec = sermon.durationSec || 0;
        const currentSec = Math.floor((parseInt(progressSlider.value) / 100) * totalSec);
        currentTimeEl.textContent = formatTime(currentSec);
        totalTimeEl.textContent = formatTime(totalSec);
      }
      updateProgressFill(progressSlider);
    }
    
    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // ============================
    // YEAR FILTER
    // ============================
    const yearBtns = document.querySelectorAll('.year-btn');
    yearBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        yearBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentYear = parseInt(btn.dataset.year);
        renderMonths();
      });
    });

    // ============================
    // SEARCH
    // ============================
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();
      const grid = document.getElementById('monthsGrid');
      
      if (!query) {
        renderMonths();
        return;
      }
      
      const yearData = sermonData[currentYear];
      let found = false;
      
      monthNames.forEach((month, index) => {
        if (!yearData[month]) return;
        const data = yearData[month];
        const hasMatch = data.sermons.some(s => 
          s.title.toLowerCase().includes(query) || 
          s.preacher.toLowerCase().includes(query) ||
          s.date.toLowerCase().includes(query)
        ) || data.theme.toLowerCase().includes(query) || monthLabels[index].toLowerCase().includes(query);
        
        const card = grid.children[index];
        if (card) {
          if (hasMatch) {
            card.style.display = '';
            found = true;
          } else {
            card.style.display = 'none';
          }
        }
      });
    });

    // ============================
    // KEYBOARD SHORTCUTS
    // ============================
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // ============================
    // INIT
    // ============================
    renderMonths();
  </script>
</body>
</html>
